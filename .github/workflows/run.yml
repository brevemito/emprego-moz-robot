name: Job Scraper Moçambique

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper/main.py

      - name: Commit jobs.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/jobs.json
          git commit -m "Update jobs.json" || echo "No changes to commit"
          git push
